<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil</title>

    <link rel="stylesheet" href="perfil.css" />
  </head>
  <body>
    <div class="perfil-container">
      <!-- TOPO -->
      <div class="topo-perfil">
        <div class="foto-area">
          <img
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
            alt="Foto usuário"
          />
        </div>

        <div class="info-user">
          <h2>Usuário</h2>

          <p>Estudante de DSM</p>

          <div class="xp-bar">
            <div class="xp-fill"></div>
          </div>

          <br />

          <div class="acoes-perfil">
            <a href="editarperfil.html" class="btn-topo"> Editar Perfil </a>

            <a href="configuracao.html" class="btn-topo btn-secundario">
              Configurações
            </a>
          </div>
        </div>
      </div>

      <div class="bio">
        <span class="biografia">Biografia</span>
        <p>
          Esta é a biografia do usuário. Você pode adicionar informações sobre
          si mesmo aqui.
        </p>
      </div>

      <!-- CARDS -->
      <div class="cards">
        <div class="card">
          <span>Amigos</span>
          <h3>48</h3>
        </div>

        <div class="card">
          <span>Encontros</span>
          <h3>12</h3>
        </div>

        <div class="card">
          <span>Conquistas</span>
          <h3>5</h3>
        </div>
      </div>

      <!-- NIVEL -->
      <div class="nivel-box">
        <div class="nivel-texto">
          <span>Nível 8 - Explorador</span>
          <span>1250 / 2000 XP</span>
        </div>

        <div class="barra-nivel">
          <div class="barra-fill"></div>
        </div>
      </div>

      <!-- CONQUISTAS -->
      <div class="conquistas">
        <h3>Conquistas</h3>
        <p class="ver-todas">Ver todas</p>

        <div class="itens-conquista">
          <div class="conquista"></div>
          <div class="conquista"></div>
          <div class="conquista"></div>
          <div class="conquista"></div>
        </div>
      </div>

      <nav class="bottom-nav" aria-label="Navegação principal">
        <a href="perfil.html" class="nav-item">
          <span class="nav-icon nav-home" aria-hidden="true"></span>
          <span>Início</span>
        </a>
        <a href="mapa.html" class="nav-item">
          <span class="nav-icon nav-map" aria-hidden="true"></span>
          <span>Mapa</span>
        </a>
        <a href="missoes.html" class="nav-item nav-active" aria-current="page">
          <span class="nav-fab" aria-hidden="true">
            <span></span>
          </span>
          <span>Missões</span>
        </a>
        <a href="conexoes.html" class="nav-item">
          <span class="nav-icon nav-network" aria-hidden="true"></span>
          <span>Conexões</span>
        </a>
        <a href="chat.html" class="nav-item">
          <span class="nav-icon nav-chat" aria-hidden="true"></span>
          <span>Mensagens</span>
        </a>
      </nav>
    </div>
  </body>
</html>
