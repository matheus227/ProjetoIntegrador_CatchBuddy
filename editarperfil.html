<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Perfil</title>

    <link rel="stylesheet" href="editarperfil.css" />
  </head>

  <body>
    <div class="edit-container">
      <div class="topo">
        <h1>Editar Perfil</h1>
        <p>Atualize suas informações</p>
      </div>

      <div class="foto-perfil">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" />
      </div>

      <br />

      <form>
        <div class="form-group">
          <label>Nome</label>
          <input type="text" placeholder="Digite seu nome" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Digite seu email" />
        </div>

        <div class="form-group">
          <label>Curso</label>
          <input type="text" placeholder="Ex: DSM" />
        </div>

        <div class="form-group">
          <label>Bio</label>
          <textarea placeholder="Fale um pouco sobre você"></textarea>
        </div>

        <br />

        <div class="botoes">
          <button class="btn salvar">
            <a href="perfil.html">Salvar Alterações</a>
          </button>
          <button class="btn cancelar">
            <a href="perfil.html">Cancelar</a>
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
